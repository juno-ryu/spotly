<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1504px;
    height: 741px;
    overflow: hidden;
    font-family: -apple-system, 'Pretendard', sans-serif;
    background: linear-gradient(135deg, #7C3AED 0%, #9333EA 40%, #A855F7 100%);
    display: flex;
    color: white;
  }

  .left {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 30px 0 80px;
    gap: 28px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 100px;
    padding: 10px 24px;
    font-size: 22px;
    font-weight: 500;
    width: fit-content;
  }

  .headline {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -2px;
  }

  .headline em {
    font-style: normal;
    color: #FDE68A;
  }

  .sub {
    font-size: 24px;
    font-weight: 400;
    line-height: 1.6;
    opacity: 0.85;
  }

  .tags {
    display: flex;
    gap: 12px;
    margin-top: 4px;
  }

  .tag {
    background: rgba(255,255,255,0.2);
    border-radius: 12px;
    padding: 10px 22px;
    font-size: 19px;
    font-weight: 500;
  }

  .right {
    width: 1050px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 28px;
    padding: 0 40px 0 0;
  }

  /* 아이폰 프레임 */
  .iphone {
    background: #1a1a1a;
    border-radius: 36px;
    padding: 9px;
    box-shadow:
      0 40px 80px rgba(0,0,0,0.35),
      0 0 0 1px rgba(255,255,255,0.08);
    flex-shrink: 0;
  }

  .iphone-screen {
    width: 250px;
    height: 542px;
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    background: white;
  }

  .iphone-screen img {
    width: 100%;
    height: auto;
    display: block;
  }

  /* 다이나믹 아일랜드 */
  .dynamic-island {
    position: absolute;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    width: 72px;
    height: 20px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  /* 상태바 */
  .status-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    z-index: 5;
    font-size: 12px;
    font-weight: 600;
    color: #000;
  }

  .status-bar-light { color: #fff; }

  .status-right {
    display: flex;
    gap: 5px;
    align-items: center;
  }

  .battery {
    width: 20px;
    height: 10px;
    border: 1.5px solid currentColor;
    border-radius: 3px;
    position: relative;
    display: inline-block;
  }

  .battery::after {
    content: '';
    position: absolute;
    right: -3px;
    top: 2px;
    width: 2px;
    height: 4px;
    background: currentColor;
    border-radius: 0 1px 1px 0;
  }

  .battery-fill {
    position: absolute;
    top: 1px; left: 1px; bottom: 1px;
    width: 70%;
    background: currentColor;
    border-radius: 1px;
  }

  .signal {
    display: flex;
    gap: 1px;
    align-items: flex-end;
    height: 9px;
  }

  .signal-bar {
    width: 3px;
    background: currentColor;
    border-radius: 1px;
  }

  .home-indicator {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 4px;
    background: rgba(0,0,0,0.3);
    border-radius: 4px;
    z-index: 10;
  }

  /* 전체 폰 그룹 */
  .phones-group {
    display: flex;
    gap: 24px;
    align-items: flex-end;
  }

  /* 가운데 폰 살짝 위로 */
  .phone-center {
    margin-bottom: 40px;
  }

  /* 좌우 폰은 아래로 */
  .phone-side {
    margin-bottom: -60px;
  }
</style>
</head>
<body>

<div class="left">
  <div class="badge">📍 AI 상권 분석 서비스</div>
  <div class="headline">
    창업 전, <em>AI가 먼저</em><br>
    상권을 분석해드려요
  </div>
  <div class="sub">
    주소와 업종만 입력하면<br>
    공공데이터 기반 경쟁·매출·인구·생존율을 한 번에
  </div>
  <div class="tags">
    <div class="tag">🏪 경쟁 분석</div>
    <div class="tag">💰 매출 추정</div>
    <div class="tag">👥 유동인구</div>
    <div class="tag">📊 생존율</div>
  </div>
</div>

<div class="right">
  <div class="phones-group">
  <!-- 1. 업종 선택 -->
  <div class="iphone phone-side">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-right">
          <div class="signal">
            <div class="signal-bar" style="height:3px"></div>
            <div class="signal-bar" style="height:5px"></div>
            <div class="signal-bar" style="height:7px"></div>
            <div class="signal-bar" style="height:9px"></div>
          </div>
          <span>5G</span>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>
      <div class="home-indicator"></div>
      <img src="phone-industry.png" alt="업종 선택">
    </div>
  </div>

  <!-- 2. 반경 선택 (지도) -->
  <div class="iphone phone-center">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>
      <div class="status-bar status-bar-light">
        <span>9:41</span>
        <div class="status-right">
          <div class="signal">
            <div class="signal-bar" style="height:3px"></div>
            <div class="signal-bar" style="height:5px"></div>
            <div class="signal-bar" style="height:7px"></div>
            <div class="signal-bar" style="height:9px"></div>
          </div>
          <span>5G</span>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>
      <div class="home-indicator"></div>
      <img src="phone-map.png" alt="반경 선택">
    </div>
  </div>

  <!-- 3. 리포트 -->
  <div class="iphone phone-side">
    <div class="iphone-screen">
      <div class="dynamic-island"></div>
      <div class="status-bar">
        <span>9:41</span>
        <div class="status-right">
          <div class="signal">
            <div class="signal-bar" style="height:3px"></div>
            <div class="signal-bar" style="height:5px"></div>
            <div class="signal-bar" style="height:7px"></div>
            <div class="signal-bar" style="height:9px"></div>
          </div>
          <span>5G</span>
          <div class="battery"><div class="battery-fill"></div></div>
        </div>
      </div>
      <div class="home-indicator"></div>
      <img src="phone-report.png" alt="AI 리포트">
    </div>
  </div>
  </div>
</div>

</body>
</html>
